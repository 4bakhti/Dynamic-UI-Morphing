name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  behaviour-agent:
    name: Behaviour Agent · tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  demo-app:
    name: Demo App · typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo-app/package-lock.json
      # demo-app imports ../src/behaviour, whose zustand dependency resolves
      # from the repository root, so both installs are required.
      - run: npm ci
      - run: npm ci
        working-directory: demo-app
      - run: npx tsc --noEmit
        working-directory: demo-app

  vendor-portal:
    name: Vendor Portal · typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vendor-portal/package-lock.json
      - run: npm ci
        working-directory: vendor-portal
      - run: npx tsc --noEmit
        working-directory: vendor-portal
